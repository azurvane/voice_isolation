version: '3.8'

services:
  voice-isolation:
    image: voice-isolation:pytorch
    container_name: voice-isolation-dev
    
    # Mount volumes
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./test_code:/app/test_code
      - ./outputs:/app/outputs
      - ./notebooks:/app/notebooks
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Working directory
    working_dir: /app
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    
    # Command
    command: bash